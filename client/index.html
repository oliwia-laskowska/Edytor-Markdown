<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projekt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="container py-4">
    <h1>Projekt</h1>

    <section id="auth" class="row g-3">
        <article class="col-md-6">
            <h2>Logowanie</h2>
            <form id="login">
                <input class="form-control mb-2" name="username" placeholder="login">
                <input class="form-control mb-2" name="password" type="password" placeholder="hasło">
                <button class="btn btn-primary">Zaloguj</button>
            </form>
        </article>

        <article class="col-md-6">
            <h2>Rejestracja</h2>
            <form id="register">
                <input class="form-control mb-2" name="username" placeholder="login">
                <input class="form-control mb-2" name="password" type="password" placeholder="User123!">
                <button class="btn btn-success">Zarejestruj</button>
            </form>
        </article>
    </section>

    <section id="app" class="hidden">
        <button id="logout" class="btn btn-outline-secondary float-end">Wyloguj</button>
        <form id="newDoc" class="input-group my-3">
            <input class="form-control" name="title" placeholder="Tytuł">
            <button class="btn btn-success">Utwórz</button>
        </form>

        <div class="row">
            <aside class="col-md-4">
                <h3>Dokumenty</h3>
                <div id="docs" class="list-group"></div>
            </aside>

            <section class="col-md-8">
                <input id="title" class="form-control mb-2" readonly>
                <textarea id="editor" class="form-control editor"></textarea>
                <button id="save" class="btn btn-primary mt-2">Zapisz</button>
                <button id="delete" class="btn btn-danger mt-2">Usuń</button>
            </section>
        </div>
    </section>

    <div id="msg" class="alert mt-3 hidden"></div>
</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
